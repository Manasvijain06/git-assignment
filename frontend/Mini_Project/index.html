<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Inventory Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Product Inventory Dashboard</h1>
    </header>

    <!-- CONTROLS -->
    <section id="controls" class="controls">
        <h2>Controls</h2>
        <input type="text" id="search" placeholder="Search product...">

        <select id="categoryFilter">
            <option value="all">All Categories</option>
        </select>

        <select id="stockFilter">
            <option value="all">All Stock</option>
            <option value="low">Low Stock (&lt;5)</option>
        </select>

        <select id="sort">
            <option value="">Sort By</option>
            <option value="low-high">Price : Low → High</option>
            <option value="high-low">Price : High → Low</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
        </select>
    </section>

    <!-- ANALYTICS -->
    <section id="analytics" class="analytics">
        <h2>Analytics</h2>
        <div id="dashboard" class="dashboard">
            <div>Total Products <span id="totalProducts">0</span></div>
            <div>Total Value ₹<span id="totalValue">0</span></div>
            <div>Out of Stock <span id="outOfStock">0</span></div>
        </div>
    </section>

    <!-- LOADING -->
    <div id="spinner" class="spinner"></div>

    <!-- PRODUCTS -->
    <section id="products">
        <h2>Products</h2>
        <div id="productGrid"></div>
        <div id="pagination"></div>
    </section>

    <!-- EMPTY MESSAGE -->
    <p id="emptyMessage">No products found</p>

    <!-- FORM TO ADD A PRODUCT -->
    <section id="form" class="form-section">
        <h2>Add Product</h2>
        <form id="productForm">
            <input type="text" id="name" placeholder="Product Name" required>
            <input type="number" id="price" placeholder="Price" required>
            <input type="number" id="stock" placeholder="Stock" required>

            <select id="category" required>
                <option value="">Select Category</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
                <option value="books">Books</option>
                <option value="accessories">Accessories</option>
            </select>

            <button type="submit" id="submitBtn">Add Product</button>
        </form>
    </section>
     
    <!-- To connect js file-->
    <script src="script.js"></script>
</body>

</html>
