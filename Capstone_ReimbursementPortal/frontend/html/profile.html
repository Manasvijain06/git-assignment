<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Reimbursement Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="employee-dashboard">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <img src="https://tse2.mm.bing.net/th/id/OIP.LcdIUlNxbbbgvux_BjLvFgAAAA?pid=ImgDet&w=181&h=181&c=7&dpr=1.3&o=7&rm=3"
                        alt="logo" width="50">
                </div>
                <span>Reimbursement<br><small>Portal</small></span>
            </div>
            <ul class="nav-links">
                <li><a href="employee.html" id="dashboardLink" class="dashboardLink">🏠 Dashboard</a></li>
                <li class="active"><a href="profile.html">👤 Profile</a></li>
            </ul>
            <div class="logout-section">
                <a href="index.html" id="logoutBtn" class="logout-btn">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="profile-wrapper">

                <div class="page-header-action">
                    <div class="header-left">
                        <h2>Account</h2>
                    </div>
                    <a href="#" id="backBtn" class="btn-secondary">
                        &larr; Back
                    </a>
                </div>

                <div class="profile-card">
                    <div class="profile-header">
                        <div class="big-avatar">👤</div>
                        <div class="profile-intro">
                            <h3 id="displayFullName">Loading...</h3>
                            <p id="displayUserRole">Employee Role</p>
                        </div>
                    </div>

                    <hr class="profile-divider">

                    <div class="profile-details">
                        <div class="info-group">
                            <label>Full Name</label>
                            <p id="infoName">-</p>
                        </div>
                        <div class="info-group">
                            <label>Email Address</label>
                            <p id="infoEmail">-</p>
                        </div>
                        <div class="info-group">
                            <label>Assigned Role</label>
                            <p id="infoRole">-</p>
                        </div>
                        <div class="info-group">
                            <label>Employee ID</label>
                            <p id="infoID">-</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="../js/profile.js"></script>
</body>

</html>
