<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Reimbursement Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="employee-dashboard">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"> <img
                        src="https://tse2.mm.bing.net/th/id/OIP.LcdIUlNxbbbgvux_BjLvFgAAAA?pid=ImgDet&w=181&h=181&c=7&dpr=1.3&o=7&rm=3"
                        alt="logo" width="50"></div>
                <span>Reimbursement<br><small>Portal</small></span>
            </div>
            <ul class="nav-links">
                <li><a href="employee.html">🏠 Dashboard</a></li>
                <li class="active"><a href="profile.html">👤 Profile</a></li>
            </ul>
            <div class="logout-section">
                <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Account Settings</h2>
            </header>

            <div class="profile-card table-card">
                <div class="profile-header">
                    <div class="big-avatar">👤</div>
                    <div class="profile-intro">
                        <h3 id="displayFullName">Loading...</h3>
                        <p id="displayUserRole">Role</p>
                    </div>
                </div>

                <hr style="margin: 25px 0; border: 0; border-top: 1px solid var(--border);">

                <div class="profile-details">
                    <div class="info-group">
                        <label>Full Name</label>
                        <p id="infoName">-</p>
                    </div>
                    <div class="info-group">
                        <label>Email Address</label>
                        <p id="infoEmail">-</p>
                    </div>
                    <div class="info-group">
                        <label>Assigned Role</label>
                        <p id="infoRole">-</p>
                    </div>
                    <div class="info-group">
                        <label>Employee ID</label>
                        <p id="infoID">-</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/profile.js"></script>
</body>

</html>
