<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Manager - Reimbursement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style1.css">
</head>

<body>

    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">
                <div class="logo-icon"> <img
                        src="https://tse2.mm.bing.net/th/id/OIP.LcdIUlNxbbbgvux_BjLvFgAAAA?pid=ImgDet&w=181&h=181&c=7&dpr=1.3&o=7&rm=3"
                        alt="logo" width="50"></div>
                <span>Reimbursement<br><small>Portal</small></span>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="admin.html">Dashboard</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div class="logout-section">
                <a href="index.html" id="logoutBtn" class="logout-btn">
                    <span>Logout</span>
                </a>
            </div>
        </nav>

        <div class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2>Assign Manager</h2>
                    <p>Admin Assignment Panel</p>
                </div>
                <div class="header-right">
                    <a href="profile.html" class="user-profile" style="text-decoration: none; color: inherit;">
                        <div class="user-info">
                            <span class="user-name" id="profileName">Admin User</span>
                            <span class="user-role" id="profileRole">ADMIN</span>
                        </div>
                        <div class="avatar">👤</div>
                    </a>
                </div>
            </header>

            <div class="management-container">
                <div id="notificationContainer" class="notification"></div>

                <div class="user-management-grid">

                    <div class="form-card">
                        <h2>Assign or Update Manager</h2>
                        <form id="assignManagerForm">
                            <div class="form-group">
                                <label for="employeeSelect">Select Employee</label>
                                <select id="employeeSelect" required>
                                    <option value="" disabled selected>Loading employees...</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="managerSelect">Select Manager</label>
                                <select id="managerSelect" required>
                                    <option value="" disabled selected>Loading managers...</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">Assign Manager</button>
                        </form>
                    </div>

                    <div class="form-card">
                        <h2>Current Assignments</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>Employee ID</th>
                                    <th>Employee Name</th>
                                    <th>Email</th>
                                    <th>Assigned To</th>
                                </tr>
                            </thead>
                            <tbody id="mappingTableBody">
                                <tr>
                                    <td colspan="4" style="text-align: center; color: var(--text-muted);">
                                        Fetching mappings...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            </main>
        </div>

        <script src="../js/assign-manager.js"></script>
</body>

</html>
