<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Reimbursement Portal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class ="container">
    <!--left side -->
    <div class = "left-section">
        <div class = "brand">
        <img src = "https://tse2.mm.bing.net/th/id/OIP.LcdIUlNxbbbgvux_BjLvFgAAAA?pid=ImgDet&w=181&h=181&c=7&dpr=1.3&o=7&rm=3" alt="logo" width="80">
        <h2>Reimbursement<br>Portal</h2>
        </div>
        <p>Submit, Track & Manage your reimbursement claims with ease.</p>
        <img src = "https://workplaceinsight.net/wp-content/uploads/2024/03/Flexible-work-report.png" alt="image">
    </div>

    <!--Right side-->
    <div class="right-section">
        <div class="login-card">
        <h2>Welcome Back!</h2>
        <p class="subtitle">Please log in to your account</p>

        <div class="input-box">
        <input type="email" id="email" placeholder="Enter email" required>
        <input type="password" id="password" placeholder="Enter password" required>

        <button onclick="login()">Login</button>
        <p class="forgot">Forgot Password?</p>

        <p class="note">© Reimbursement Portal</p>

        </div>
    </div>
</div>

<script src="../js/login.js"></script>

</body>
</html>
