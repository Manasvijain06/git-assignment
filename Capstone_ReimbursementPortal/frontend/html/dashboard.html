<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Reimbursement Portal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Reimbursement</h2>

        <ul>
            <li onclick="showSection('home')">🏠 Home</li>
            <li onclick="showSection('submit')">➕ Submit Claim</li>
            <li onclick="showSection('myClaims')">📄 My Claims</li>
            <li onclick="logout()">🚪 Logout</li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h1>Welcome 👋</h1>
        <p id="userInfo"></p>

        <!-- HOME -->
        <div id="home" class="section">
            <h2>Dashboard Overview</h2>
            <p>Track and manage your reimbursement claims.</p>
        </div>

        <!-- SUBMIT CLAIM -->
        <div id="submit" class="section hidden">
            <h2>Submit Claim</h2>

            <input type="number" id="amount" placeholder="Amount">
            <input type="date" id="date">
            <textarea id="description" placeholder="Description"></textarea>

            <button onclick="submitClaim()">Submit</button>
        </div>

        <!-- MY CLAIMS -->
        <div id="myClaims" class="section hidden">
            <h2>My Claims</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="claimsTable"></tbody>
            </table>
        </div>

    </div>

</div>

<script src="../js/dashboard.js"></script>

</body>
</html>
